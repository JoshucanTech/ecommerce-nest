services:
  backend:
    container_name: e-backend
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ecommerce-backend:dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      RUN_SEED: 0
      DATABASE_URL: postgresql://postgres:secret2580@postgres:5432/ecommerce?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-cEVNBXuvqiPfH81BlmSZYcii/hnjqTibnbS6ye5vWgQ=}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-7d}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HOST: 0.0.0.0
      PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY:-dummy_public_key}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-dummy_secret_key}
    restart: unless-stopped
    networks:
      - ecommerce-internal
      - ecommerce-public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    container_name: e-postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret2580
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ecommerce-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: e-redis
    image: redis:alpine
    restart: unless-stopped
    networks:
      - ecommerce-internal
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  studio:
    container_name: e-studio
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ecommerce-backend:dev
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:secret2580@postgres:5432/ecommerce?schema=public
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npx prisma studio --port 5555
    networks:
      - ecommerce-internal

  seed:
    container_name: e-seed
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ecommerce-backend:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:secret2580@postgres:5432/ecommerce?schema=public
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma db seed"
    networks:
      - ecommerce-internal
    profiles:
      - seed # Only runs when explicitly called or via --profile seed

volumes:
  postgres_data:
  redis_data:

networks:
  ecommerce-internal:
    driver: bridge
  ecommerce-public:
    name: ecommerce-public
    driver: bridge
